server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Every SPA route serves this file. It must be revalidated on every request so
  # an old entry bundle never points at chunks removed by a newer deployment.
  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  # Vite asset names are content hashed. Missing assets must return 404 instead
  # of the SPA HTML fallback, which is not a valid JavaScript module response.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
