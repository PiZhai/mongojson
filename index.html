<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MongoDB JSON Formatter</title>
<style>
/* ========== CSS Variables ========== */
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-hover: #1c2128;
  --border: #30363d;
  --border-focus: #00ed64;
  --text: #c9d1d9;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --primary: #00ed64;
  --primary-hover: #00d452;
  --primary-bg: rgba(0, 237, 100, 0.1);
  --error: #f85149;
  --error-bg: rgba(248, 81, 73, 0.1);
  --warning: #d29922;
  --warning-bg: rgba(210, 153, 34, 0.1);
  --success: #3fb950;
  --hl-key: #79c0ff;
  --hl-string: #a5d6ff;
  --hl-number: #79c0ff;
  --hl-keyword: #ff7b72;
  --hl-mongo: #d2a8ff;
  --hl-bracket: #c9d1d9;
  --hl-colon: #8b949e;
  --radius: 8px;
  --radius-sm: 4px;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  --transition: 150ms ease;
  --compare-center-gap: 112px;
}

[data-theme="light"] {
  --bg: #ffffff;
  --surface: #f6f8fa;
  --surface-hover: #eef0f3;
  --border: #d0d7de;
  --border-focus: #00703c;
  --text: #24292f;
  --text-secondary: #656d76;
  --text-muted: #8c959f;
  --primary: #00703c;
  --primary-hover: #005a30;
  --primary-bg: rgba(0, 112, 60, 0.08);
  --error: #cf222e;
  --error-bg: rgba(207, 34, 46, 0.08);
  --warning: #9a6700;
  --warning-bg: rgba(154, 103, 0, 0.08);
  --success: #1a7f37;
  --hl-key: #0550ae;
  --hl-string: #0a3069;
  --hl-number: #0550ae;
  --hl-keyword: #cf222e;
  --hl-mongo: #8250df;
  --hl-bracket: #24292f;
  --hl-colon: #656d76;
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition), color var(--transition);
}

/* ========== Layout ========== */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.header-left { display: flex; align-items: center; gap: 12px; }

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: -0.3px;
}

.logo svg { flex-shrink: 0; }

.header-actions { display: flex; align-items: center; gap: 8px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
  user-select: none;
}
.btn:hover { background: var(--surface-hover); border-color: var(--text-secondary); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  color: #000;
  background: var(--primary);
  border-color: var(--primary);
  font-weight: 600;
}
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-icon {
  width: 32px; height: 32px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  border-radius: var(--radius-sm);
}

/* Main editor area */
.editor-container {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  transition: flex 0.3s ease;
}

.input-panel.collapsed {
  flex: 0 0 auto;
  min-width: auto;
}
.input-panel.collapsed .input-area,
.input-panel.collapsed .error-display {
  display: none;
}
.collapse-btn-collapsed { transform: rotate(180deg); }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 40px;
  padding: 4px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.panel-header span {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}

.panel-header .btn {
  padding: 4px 10px;
  font-size: 11px;
  line-height: 1.4;
}
.panel-header .btn-icon {
  width: auto; height: auto;
  padding: 4px 8px;
  font-size: 14px;
}

.panel-divider {
  width: 1px;
  background: var(--border);
  flex-shrink: 0;
  transition: background var(--transition);
}

/* Textarea */
.input-area {
  flex: 1;
  display: flex;
  min-height: 0;
}

#input {
  flex: 1;
  width: 100%;
  padding: 16px;
  border: none;
  outline: none;
  resize: none;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
  tab-size: 2;
  transition: background var(--transition), color var(--transition);
}

#input::placeholder { color: var(--text-muted); }

#input:focus { box-shadow: inset 0 0 0 1px var(--border-focus); }

/* Compare mode */
.monaco-diff-container {
  display: none;
  flex: 1;
  min-width: 0;
  min-height: 0;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.diff-editor-host {
  width: 100%;
  height: 100%;
}
.editor-container.diff-mode .panel,
.editor-container.diff-mode .panel-divider {
  display: none;
}
.editor-container.diff-mode .monaco-diff-container {
  display: block;
}
.monaco-diff-container .monaco-diff-editor.side-by-side .editor.original {
  width: calc(50% - (var(--compare-center-gap) / 2)) !important;
}
.monaco-diff-container .monaco-diff-editor.side-by-side .editor.modified {
  left: calc(50% + (var(--compare-center-gap) / 2)) !important;
  width: calc(50% - (var(--compare-center-gap) / 2)) !important;
}
.compare-center-gutter {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: var(--compare-center-gap);
  display: none;
  align-items: stretch;
  justify-content: center;
  pointer-events: none;
  z-index: 8;
  background: var(--bg);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.compare-center-gutter.visible {
  display: flex;
}
.compare-center-lines {
  position: relative;
  flex: 1;
  min-width: 0;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 22px;
  color: var(--text-muted);
  user-select: none;
}
.compare-center-lines-left {
  padding-right: 12px;
  text-align: right;
  border-right: 1px solid var(--border);
}
.compare-center-lines-right {
  padding-left: 12px;
  text-align: left;
}
.compare-center-line {
  position: absolute;
  left: 0;
  right: 0;
  height: 22px;
  white-space: nowrap;
}
.monaco-editor .compare-field-left-only {
  background: rgba(248, 81, 73, 0.22);
  box-shadow: inset 3px 0 0 var(--error);
}
.monaco-editor .compare-field-right-only {
  background: rgba(63, 185, 80, 0.2);
  box-shadow: inset 3px 0 0 var(--success);
}
.compare-loading,
.compare-loading-error {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 24px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}
.compare-loading-error {
  color: var(--error);
}
.diff-btn-active {
  color: var(--primary) !important;
  border-color: var(--primary) !important;
  background: var(--primary-bg) !important;
}

/* Output */
.output-wrapper {
  flex: 1;
  overflow: auto;
  background: var(--bg);
  transition: background var(--transition);
  position: relative;
}

#output {
  margin: 0;
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
  tab-size: 2;
  white-space: pre;
  min-height: 100%;
}

/* Editable textarea (hidden in view mode) */
.output-edit {
  display: none;
  width: 100%;
  height: 100%;
  min-height: 100%;
  padding: 16px;
  border: none;
  outline: none;
  resize: none;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
  tab-size: 2;
  transition: background var(--transition), color var(--transition);
}
.output-edit::placeholder { color: var(--text-muted); }
.output-edit:focus { box-shadow: inset 0 0 0 1px var(--border-focus); }

/* Edit mode toggle */
.output-panel .output-view { display: block; }
.output-panel .output-edit { display: none; }
.output-panel.edit-mode .output-view { display: none; }
.output-panel.edit-mode .output-edit { display: block; }
.output-panel.edit-mode #editBtn { color: var(--primary); border-color: var(--primary); }

.output-placeholder {
  color: var(--text-muted);
  font-style: italic;
  user-select: none;
}

.output-code { counter-reset: line; display: block; }

.output-line {
  counter-increment: line;
  display: flex;
  min-height: 1.65em;
}

.output-line::before {
  content: counter(line);
  display: inline-block;
  width: 36px;
  min-width: 36px;
  padding-right: 12px;
  text-align: right;
  color: var(--text-muted);
  user-select: none;
  flex-shrink: 0;
  font-size: 11px;
  line-height: 1.65;
}

.output-line .line-content { flex: 1; min-width: 0; }

/* Syntax highlighting */
.hl-key    { color: var(--hl-key); }
.hl-string { color: var(--hl-string); }
.hl-number { color: var(--hl-number); }
.hl-keyword{ color: var(--hl-keyword); }
.hl-mongo  { color: var(--hl-mongo); }
.hl-bracket{ color: var(--hl-bracket); font-weight: 600; }

/* Error display */
.error-display {
  display: none;
  padding: 8px 16px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--error);
  background: var(--error-bg);
  border-top: 1px solid var(--error);
  white-space: pre-wrap;
  word-break: break-all;
}

.error-display.visible { display: block; }

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--surface);
  flex-shrink: 0;
  transition: background var(--transition), color var(--transition);
  gap: 16px;
}

.status-left, .status-right { display: flex; align-items: center; gap: 12px; }

.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}

.status-dot.success { background: var(--success); }
.status-dot.error   { background: var(--error); }
.status-dot.warn    { background: var(--warning); }

/* Toast */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  background: #333;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 200ms ease;
}
.toast.show { opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Responsive */
@media (max-width: 768px) {
  :root { --compare-center-gap: 84px; }
  .editor-container { flex-direction: column; }
  .panel-divider { width: 100%; height: 1px; }
  .panel { flex: none; height: 50%; }
  .header { padding: 10px 12px; }
  .panel-header { padding: 6px 12px; }
  #input, #output { padding: 12px; font-size: 12px; }
}

/* ========== Mongosql Table View ========== */
.table-wrapper {
  display: none;
  flex: 1;
  overflow: auto;
  background: var(--bg);
  transition: background var(--transition);
  position: relative;
}
.table-wrapper.active { display: flex; flex-direction: column; }

/* Validation banner */
.validation-banner {
  flex-shrink: 0;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-size: 12px;
  transition: background var(--transition), border-color var(--transition);
}
.val-stat {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
}
.val-stat.ok { background: var(--primary-bg); color: var(--success); }
.val-stat.warn { background: var(--warning-bg); color: var(--warning); }
.val-stat.err { background: var(--error-bg); color: var(--error); }
.val-stat .val-icon { font-size: 11px; }

/* Table container */
.sql-table-wrap {
  flex: 1;
  overflow: auto;
  padding: 0;
}
.sql-table {
  width: max-content;
  min-width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
}
.sql-table thead { position: sticky; top: 0; z-index: 5; }
.sql-table th {
  background: var(--surface);
  color: var(--text);
  font-weight: 600;
  padding: 8px 14px;
  border-bottom: 2px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap;
  text-align: left;
  min-width: 80px;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
  cursor: pointer;
  user-select: none;
}
.sql-table th:hover { background: var(--surface-hover); }
.sql-table th .col-type-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 400;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
  vertical-align: middle;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.col-type-badge.t-string  { background: var(--hl-key); color: #000; }
.col-type-badge.t-number  { background: var(--hl-number); color: #000; }
.col-type-badge.t-date    { background: #d2a8ff; color: #000; }
.col-type-badge.t-bool    { background: var(--hl-keyword); color: #fff; }
.col-type-badge.t-null    { background: var(--text-muted); color: #fff; }
.col-type-badge.t-mixed   { background: var(--warning); color: #000; }
.col-type-badge.t-array   { background: var(--hl-mongo); color: #000; }
.col-type-badge.t-object  { background: var(--text-secondary); color: #fff; }

.sql-table td {
  padding: 6px 14px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
  color: var(--text);
}
.sql-table td.row-num {
  color: var(--text-muted);
  text-align: right;
  font-size: 11px;
  min-width: 40px;
  width: 40px;
  background: var(--surface);
  position: sticky;
  left: 0;
  z-index: 2;
}
.sql-table th.col-row-num {
  min-width: 40px;
  width: 40px;
  position: sticky;
  left: 0;
  z-index: 6;
}
.sql-table td.cell-null {
  color: var(--text-muted);
  font-style: italic;
}
.sql-table td.cell-empty-arr {
  color: var(--text-muted);
}
.sql-table td.cell-warn {
  background: rgba(210, 153, 34, 0.08);
}
.sql-table tbody tr:hover td {
  background: var(--surface-hover);
}
.sql-table tbody tr:hover td.row-num {
  background: var(--surface-hover);
}

/* Table toolbar */
.table-toolbar {
  flex-shrink: 0;
  padding: 6px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-secondary);
  transition: background var(--transition), border-color var(--transition);
}
.table-toolbar .table-pagination {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}
.table-toolbar input[type="text"] {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  outline: none;
  width: 160px;
  transition: border-color var(--transition);
}
.table-toolbar input[type="text"]:focus {
  border-color: var(--border-focus);
}

/* Wide field path ellipsis in header */
.sql-table th .col-path {
  display: block;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sql-table th.sorted-asc::after  { content: ' ▲'; font-size: 9px; }
.sql-table th.sorted-desc::after { content: ' ▼'; font-size: 9px; }

/* ========== Shell Mode Highlighting ========== */
.hl-shell-db    { color: #d2a8ff; font-weight: 600; }
.hl-shell-method{ color: #79c0ff; font-weight: 600; }
.hl-shell-op    { color: #ffa657; font-weight: 500; }
.hl-shell-str   { color: #a5d6ff; }
.hl-shell-paren { color: #c9d1d9; font-weight: 600; }
.hl-shell-dot   { color: #8b949e; font-weight: 600; }
.hl-shell-comma { color: #8b949e; }
.hl-shell-comment{ color: #6e7681; font-style: italic; }

[data-theme="light"] .hl-shell-db    { color: #8250df; }
[data-theme="light"] .hl-shell-method{ color: #0550ae; }
[data-theme="light"] .hl-shell-op    { color: #cf222e; }
[data-theme="light"] .hl-shell-str   { color: #0a3069; }
[data-theme="light"] .hl-shell-paren { color: #24292f; }
[data-theme="light"] .hl-shell-dot   { color: #656d76; }
[data-theme="light"] .hl-shell-comma { color: #656d76; }
[data-theme="light"] .hl-shell-comment{ color: #8c959f; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-4-4 1.41-1.41L11 14.17l5.59-5.59L18 10l-7 7z"/></svg>
        MongoDB JSON
      </span>
      <span style="font-size:11px;color:var(--text-muted)">Formatter</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-icon" id="themeBtn" title="切换主题" aria-label="切换主题">🌙</button>
      <button class="btn btn-primary" id="formatBtn" title="格式化输入内容">✨ 格式化</button>
      <button class="btn" id="sampleBtn" title="切换到格式化模式">格式化</button>
      <button class="btn" id="diffBtn">🔍 对比</button>
      <button class="btn" id="tableBtn">📊 表格</button>
      <button class="btn" id="shellBtn">🔧 Shell</button>
    </div>
  </header>

  <!-- Editor -->
  <div class="editor-container">
    <!-- Input Panel -->
    <div class="panel input-panel">
      <div class="panel-header">
        <span>INPUT</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-icon" id="collapseInputBtn" title="折叠输入面板">◀</button>
          <button class="btn" id="clearBtn">清除</button>
          <button class="btn" id="pasteBtn">📋 粘贴</button>
        </div>
      </div>
      <div class="input-area">
        <textarea id="input" placeholder="在此输入或粘贴 MongoDB JSON...&#10;支持: ObjectId, ISODate, NumberLong, BinData 等类型" spellcheck="false"></textarea>
      </div>
      <div class="error-display" id="errorDisplay"></div>
    </div>

    <div class="panel-divider"></div>

    <!-- Output Panel -->
    <div class="panel output-panel">
      <div class="panel-header">
        <span>OUTPUT</span>
        <div style="display:flex;gap:6px;">
          <button class="btn" id="editBtn">✏️ 编辑</button>

      </div>
      <div class="output-wrapper" id="outputWrapper">
        <pre id="output" class="output-view"><code class="output-code"><span class="output-placeholder">格式化后的 JSON 将显示在这里</span></code></pre>
        <textarea id="outputTextarea" class="output-edit" spellcheck="false" placeholder="格式化后的 JSON 将显示在这里"></textarea>
      </div>
      <!-- Mongosql Table View -->
      <div class="table-wrapper" id="tableWrapper">
        <div class="validation-banner" id="validationBanner"></div>
        <div class="sql-table-wrap" id="sqlTableWrap">
          <table class="sql-table" id="sqlTable"></table>
        </div>
        <div class="table-toolbar" id="tableToolbar">
          <span id="tableRowCount"></span>
          <input type="text" id="tableFilter" placeholder="🔍 筛选字段或值..." />
          <button class="btn" id="tableExportBtn" style="font-size:11px;padding:3px 10px;">📥 导出CSV</button>
          <div class="table-pagination">
            <button class="btn" id="tablePrevBtn" style="font-size:11px;padding:3px 8px;" disabled>◀</button>
            <span id="tablePageInfo">1/1</span>
            <button class="btn" id="tableNextBtn" style="font-size:11px;padding:3px 8px;" disabled>▶</button>

    <div class="monaco-diff-container">
      <div class="diff-editor-host" id="diffEditorContainer"></div>
      <div class="compare-center-gutter" id="compareCenterGutter" aria-hidden="true">
        <div class="compare-center-lines compare-center-lines-left" id="compareCenterLinesLeft"></div>
        <div class="compare-center-lines compare-center-lines-right" id="compareCenterLinesRight"></div>
      </div>

  <!-- Status Bar -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">就绪</span>
    </div>
    <div class="status-right">
      <span id="charCount">字符: 0</span>
      <span id="lineCount">行数: 0</span>
      <span id="depthInfo"></span>
    </div>
  </footer>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ==================== CONSTANTS ====================
  const MONGO_FUNCTIONS = new Set([
    'ObjectId', 'ISODate', 'NumberLong', 'NumberInt', 'NumberDecimal',
    'BinData', 'Timestamp', 'Date', 'RegExp', 'UUID', 'Code', 'DBRef'
  ]);

  const MONGO_KEYWORDS = new Set(['MinKey', 'MaxKey']);

  const LITERALS = new Set(['true', 'false', 'null', 'undefined', 'NaN', 'Infinity']);
  const MONACO_BASE_URL = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min';

  // ==================== TOKENIZER ====================
  function tokenize(input) {
    const tokens = [];
    let i = 0;
    const len = input.length;

    while (i < len) {
      const ch = input[i];
      const startPos = i;

      // Whitespace
      if (ch === ' ' || ch === '\t' || ch === '\n' || ch === '\r') {
        i++;
        continue;
      }

      // Single-line comment //
      if (ch === '/' && input[i + 1] === '/') {
        while (i < len && input[i] !== '\n') i++;
        continue;
      }

      // Block comment /* */
      if (ch === '/' && input[i + 1] === '*') {
        i += 2;
        while (i < len - 1 && !(input[i] === '*' && input[i + 1] === '/')) i++;
        if (i < len) i += 2;
        continue;
      }

      // Structural tokens
      if ('{}[]:,'.includes(ch)) {
        tokens.push({ type: ch, pos: startPos });
        i++;
        continue;
      }

      // String (double-quoted)
      if (ch === '"') {
        i++; // skip opening quote
        let str = '';
        while (i < len) {
          if (input[i] === '\\' && i + 1 < len) {
            str += input[i] + input[i + 1];
            i += 2;
          } else if (input[i] === '"') {
            i++; // skip closing quote
            break;
          } else {
            str += input[i];
            i++;
          }
        }
        tokens.push({ type: 'STRING', value: str, pos: startPos });
        continue;
      }

      // String (single-quoted) — non-standard but common in MongoDB shell
      if (ch === "'") {
        i++;
        let str = '';
        while (i < len) {
          if (input[i] === '\\' && i + 1 < len) {
            str += input[i] + input[i + 1];
            i += 2;
          } else if (input[i] === "'") {
            i++;
            break;
          } else {
            str += input[i];
            i++;
          }
        }
        tokens.push({ type: 'STRING', value: str, pos: startPos });
        continue;
      }

      // Number (including negative, float, scientific notation)
      if (ch === '-' && i + 1 < len && /[0-9]/.test(input[i + 1])) {
        let num = '-';
        i++;
        while (i < len && /[0-9]/.test(input[i])) { num += input[i]; i++; }
        if (i < len && input[i] === '.') {
          num += '.';
          i++;
          while (i < len && /[0-9]/.test(input[i])) { num += input[i]; i++; }
        }
        if (i < len && (input[i] === 'e' || input[i] === 'E')) {
          num += input[i]; i++;
          if (i < len && (input[i] === '+' || input[i] === '-')) { num += input[i]; i++; }
          while (i < len && /[0-9]/.test(input[i])) { num += input[i]; i++; }
        }
        tokens.push({ type: 'NUMBER', value: num, pos: startPos });
        continue;
      }

      if (ch >= '0' && ch <= '9') {
        let num = '';
        while (i < len && /[0-9]/.test(input[i])) { num += input[i]; i++; }
        if (i < len && input[i] === '.') {
          num += '.';
          i++;
          while (i < len && /[0-9]/.test(input[i])) { num += input[i]; i++; }
        }
        if (i < len && (input[i] === 'e' || input[i] === 'E')) {
          num += input[i]; i++;
          if (i < len && (input[i] === '+' || input[i] === '-')) { num += input[i]; i++; }
          while (i < len && /[0-9]/.test(input[i])) { num += input[i]; i++; }
        }
        tokens.push({ type: 'NUMBER', value: num, pos: startPos });
        continue;
      }

      // Word tokens: identifiers, keywords, MongoDB types
      if (/[a-zA-Z_$]/.test(ch)) {
        let word = '';
        while (i < len && /[a-zA-Z0-9_$]/.test(input[i])) { word += input[i]; i++; }

        // Check for `new Type(...)` pattern
        if (word === 'new') {
          while (i < len && /\s/.test(input[i])) i++;
          let typeWord = '';
          const typeStart = i;
          while (i < len && /[a-zA-Z_]/.test(input[i])) { typeWord += input[i]; i++; }
          while (i < len && /\s/.test(input[i])) i++;
          if (i < len && input[i] === '(') {
            // Consume balanced parens
            i++; // skip (
            let args = '';
            let depth = 1;
            while (i < len && depth > 0) {
              if (input[i] === '(') depth++;
              else if (input[i] === ')') depth--;
              if (depth > 0) args += input[i];
              i++;
            }
            tokens.push({ type: 'MONGO', func: 'new ' + typeWord, args: args.trim(), pos: startPos });
          } else {
            tokens.push({ type: 'IDENT', value: word, pos: startPos });
            i = typeStart; // backtrack
          }
          continue;
        }

        // MongoDB function types: ObjectId(...), ISODate(...), etc.
        if (MONGO_FUNCTIONS.has(word)) {
          while (i < len && /\s/.test(input[i])) i++;
          if (i < len && input[i] === '(') {
            i++; // skip (
            let args = '';
            let depth = 1;
            while (i < len && depth > 0) {
              if (input[i] === '(') depth++;
              else if (input[i] === ')') depth--;
              if (depth > 0) args += input[i];
              i++;
            }
            tokens.push({ type: 'MONGO', func: word, args: args.trim(), pos: startPos });
          } else {
            tokens.push({ type: 'IDENT', value: word, pos: startPos });
          }
          continue;
        }

        // MongoDB keyword types: MinKey, MaxKey (no parens)
        if (MONGO_KEYWORDS.has(word)) {
          tokens.push({ type: 'MONGO', func: word, args: null, pos: startPos });
          continue;
        }

        // Literals: true, false, null, undefined, NaN, Infinity
        if (LITERALS.has(word)) {
          tokens.push({ type: 'LITERAL', value: word, pos: startPos });
          continue;
        }

        // Regular identifier (unquoted key etc.)
        tokens.push({ type: 'IDENT', value: word, pos: startPos });
        continue;
      }

      // Skip unknown character
      i++;
    }

    return tokens;
  }

  // ==================== PARSER ====================
  function parse(tokens) {
    let pos = 0;

    function peek() { return pos < tokens.length ? tokens[pos] : null; }
    function next() {
      if (pos >= tokens.length) throw errorAt('Unexpected end of input', null);
      return tokens[pos++];
    }

    function errorAt(msg, token) {
      const p = token ? token.pos : (pos < tokens.length ? tokens[pos].pos : -1);
      const err = new Error(msg);
      err.position = p;
      return err;
    }

    function expect(type) {
      const t = next();
      if (!t || t.type !== type) {
        throw errorAt(
          `Expected ${type} but got ${t ? "'" + t.type + "'" : 'EOF'}`,
          t
        );
      }
      return t;
    }

    function parseValue() {
      const t = peek();
      if (!t) throw errorAt('Unexpected end of input', null);

      switch (t.type) {
        case '{': return parseObject();
        case '[': return parseArray();
        case 'STRING': next(); return { type: 'string', value: t.value };
        case 'NUMBER': next(); return { type: 'number', value: t.value };
        case 'LITERAL': next(); return { type: 'literal', value: t.value };
        case 'MONGO': next(); return { type: 'mongo', func: t.func, args: t.args };
        case 'IDENT':
          next();
          // Treat unquoted identifiers as strings (lenient mode)
          return { type: 'string', value: t.value };
        default:
          throw errorAt(`Unexpected token '${t.type}'`, t);
      }
    }

    function parseObject() {
      expect('{');
      const obj = { type: 'object', entries: [] };

      let t = peek();
      if (t && t.type === '}') { next(); return obj; }

      while (true) {
        // Parse key: can be STRING or IDENT (lenient)
        t = peek();
        let key;
        if (t && (t.type === 'STRING' || t.type === 'IDENT')) {
          key = t.value;
          next();
        } else {
          throw errorAt(`Expected property key but got ${t ? "'" + t.type + "'" : 'EOF'}`, t);
        }

        // Parse colon
        t = peek();
        if (t && t.type === ':') {
          next();
        } else {
          throw errorAt(`Expected ':' after key '${key}' but got ${t ? "'" + t.type + "'" : 'EOF'}`, t);
        }

        // Parse value
        const value = parseValue();
        obj.entries.push({ key, value });

        // Comma or end of object
        t = peek();
        if (t && t.type === ',') {
          next();
          t = peek();
          if (t && t.type === '}') { next(); break; } // trailing comma OK
        } else if (t && t.type === '}') {
          next();
          break;
        } else {
          throw errorAt(`Expected ',' or '}' but got ${t ? "'" + t.type + "'" : 'EOF'}`, t);
        }
      }

      return obj;
    }

    function parseArray() {
      expect('[');
      const arr = { type: 'array', items: [] };

      let t = peek();
      if (t && t.type === ']') { next(); return arr; }

      while (true) {
        arr.items.push(parseValue());

        t = peek();
        if (t && t.type === ',') {
          next();
          t = peek();
          if (t && t.type === ']') { next(); break; } // trailing comma OK
        } else if (t && t.type === ']') {
          next();
          break;
        } else {
          throw errorAt(`Expected ',' or ']' but got ${t ? "'" + t.type + "'" : 'EOF'}`, t);
        }
      }

      return arr;
    }

    let ast;
    try {
      ast = parseValue();
    } catch (e) {
      // Try parsing as top-level array or object
      throw e;
    }

    // Check for trailing garbage
    if (pos < tokens.length) {
      const leftover = tokens.slice(pos).map(t => t.type === 'STRING' ? `"${t.value}"` : t.value || t.type).join(' ');
      throw errorAt(`Unexpected tokens after end of JSON: ${leftover}`, tokens[pos]);
    }

    return ast;
  }

  // ==================== FORMATTER ====================
  function formatAST(node, indent, indentSize) {
    if (indent === undefined) indent = 0;
    if (indentSize === undefined) indentSize = 2;
    const pad = ' '.repeat(indent);
    const inner = ' '.repeat(indent + indentSize);

    switch (node.type) {
      case 'object': {
        const entries = node.entries;
        if (entries.length === 0) return pad + '{}';
        const parts = entries.map(e => {
          var valFormatted = formatAST(e.value, indent + indentSize, indentSize);
          // trimStart strips the pad that formatAST prepends, then inner re-adds the correct level
          return inner + '"' + e.key + '" : ' + valFormatted.trimStart();
        });
        return pad + '{\n' + parts.join(',\n') + '\n' + pad + '}';
      }

      case 'array': {
        const items = node.items;
        if (items.length === 0) return pad + '[]';
        const parts = items.map(item => formatAST(item, indent + indentSize, indentSize));
        const allSimple = items.every(it => {
          return it.type === 'string' || it.type === 'number' || it.type === 'literal' || it.type === 'mongo' ||
                 (it.type === 'object' && it.entries.length === 0) ||
                 (it.type === 'array' && it.items.length === 0);
        });
        if (allSimple) {
          return pad + '[ ' + parts.map(p => p.trim()).join(', ') + ' ]';
        }
        // Non-simple array: each part already carries its pad (via formatAST),
        // so we join them as-is — no extra indent on the first line of each item.
        return pad + '[\n' + parts.join(',\n') + '\n' + pad + ']';
      }

      case 'string':
        return pad + '"' + node.value + '"';

      case 'number':
        return pad + node.value;

      case 'literal':
        return pad + node.value;

      case 'mongo':
        if (node.args !== null && node.args !== undefined) {
          return pad + node.func + '(' + node.args + ')';
        }
        return pad + node.func;

      default:
        return pad + JSON.stringify(node);
    }
  }

  function formatASTCompact(node) {
    switch (node.type) {
      case 'object': {
        const entries = node.entries;
        if (entries.length === 0) return '{}';
        const parts = entries.map(e => '"' + e.key + '":' + formatASTCompact(e.value));
        return '{' + parts.join(',') + '}';
      }
      case 'array': {
        const items = node.items;
        if (items.length === 0) return '[]';
        return '[' + items.map(it => formatASTCompact(it)).join(',') + ']';
      }
      case 'string': return '"' + node.value + '"';
      case 'number': return node.value;
      case 'literal': return node.value;
      case 'mongo':
        if (node.args !== null && node.args !== undefined) return node.func + '(' + node.args + ')';
        return node.func;
      default: return JSON.stringify(node);
    }
  }

  // ==================== SYNTAX HIGHLIGHTING ====================
  function highlightText(text) {
    // Escape HTML entities in raw text first
    var html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Step 1: All double-quoted strings (applied to raw text BEFORE any HTML tags exist)
    html = html.replace(
      /"((?:[^"\\]|\\.)*)"/g,
      '<span class="hl-string">"$1"</span>'
    );

    // Step 2: Keys — override hl-string with hl-key when string is followed by colon
    html = html.replace(
      /<span class="hl-string">"((?:[^"\\]|\\.)*)"<\/span>(\s*:\s)/g,
      '<span class="hl-key">"$1"</span>$2'
    );

    // Step 3: MongoDB functions (after strings, so it matches ONLY in plain-text segments)
    html = html.replace(
      /\b(ObjectId|ISODate|NumberLong|NumberInt|NumberDecimal|BinData|Timestamp|RegExp|UUID|Code|DBRef|new\s+Date|MinKey|MaxKey)\b/g,
      '<span class="hl-mongo">$1</span>'
    );

    // Step 4: Numbers + literals — only inside text segments NOT inside string spans
    var parts = html.split(/(<[^>]+>)/g);
    var result = '';
    var inStringSpan = 0; // depth counter for string spans (handles potential nesting)
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 0) {
        var segment = parts[i];
        if (inStringSpan === 0) {
          // Numbers (integers, floats, scientific notation)
          segment = segment.replace(
            /(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g,
            '<span class="hl-number">$1</span>'
          );
          // Literals
          segment = segment.replace(
            /\b(true|false|null|undefined)\b/g,
            '<span class="hl-keyword">$1</span>'
          );
        }
        result += segment;
      } else {
        // Track string span depth
        if (/^<span\s+class="hl-string"/.test(parts[i]) || /^<span\s+class='hl-string'/.test(parts[i])) {
          inStringSpan++;
        } else if (/^<\/span>/.test(parts[i]) && inStringSpan > 0) {
          inStringSpan--;
        }
        result += parts[i];
      }
    }

    // Step 5: Brackets (safe — { } [ ] rarely appear inside HTML tags)
    result = result.replace(/([{}[\]])/g, '<span class="hl-bracket">$1</span>');

    return result;
  }

  function renderOutput(formattedText) {
    const lines = formattedText.split('\n');
    const htmlLines = lines.map(line => {
      const hl = highlightText(line);
      return '<div class="output-line"><span class="line-content">' + (hl || '&nbsp;') + '</span></div>';
    });
    return '<code class="output-code">' + htmlLines.join('') + '</code>';
  }

  // ==================== COMPUTE DEPTH ====================
  function computeMaxDepth(node) {
    if (!node) return 0;
    switch (node.type) {
      case 'object':
        if (node.entries.length === 0) return 1;
        return 1 + Math.max(...node.entries.map(e => computeMaxDepth(e.value)));
      case 'array':
        if (node.items.length === 0) return 1;
        return 1 + Math.max(...node.items.map(computeMaxDepth));
      default:
        return 0;
    }
  }

  // ==================== MAIN FORMAT FUNCTION ====================
  function formatJSON(input, compact) {
    if (!input || !input.trim()) {
      return { error: '输入为空' };
    }

    let tokens;
    try {
      tokens = tokenize(input);
    } catch (e) {
      return { error: '词法分析失败: ' + e.message, position: e.position };
    }

    let ast;
    try {
      ast = parse(tokens);
    } catch (e) {
      return { error: e.message, position: e.position };
    }

    let formatted;
    if (compact) {
      formatted = formatASTCompact(ast);
    } else {
      formatted = formatAST(ast, 0, 2);
    }

    const lineCount = formatted.split('\n').length;
    const charCount = formatted.length;
    const maxDepth = computeMaxDepth(ast);

    return { formatted, ast, lineCount, charCount, maxDepth };
  }

  function sortASTNode(node) {
    if (!node) return node;

    switch (node.type) {
      case 'object':
        return {
          type: 'object',
          entries: node.entries
            .map(function(entry) {
              return { key: entry.key, value: sortASTNode(entry.value) };
            })
            .sort(function(a, b) {
              return a.key.localeCompare(b.key);
            })
        };
      case 'array':
        return {
          type: 'array',
          items: node.items.map(sortASTNode)
        };
      case 'string':
      case 'number':
      case 'literal':
        return { type: node.type, value: node.value };
      case 'mongo':
        return { type: 'mongo', func: node.func, args: node.args };
      default:
        return node;
    }
  }

  function joinFieldPath(basePath, segment) {
    if (typeof segment === 'number') {
      return basePath ? basePath + '[' + segment + ']' : '[' + segment + ']';
    }
    return basePath ? basePath + '.' + segment : segment;
  }

  function collectFieldPaths(node, basePath, paths) {
    if (!node) return;

    if (node.type === 'object') {
      for (var i = 0; i < node.entries.length; i++) {
        var entry = node.entries[i];
        var entryPath = joinFieldPath(basePath, entry.key);
        paths.push({ path: entryPath, key: entry.key });
        collectFieldPaths(entry.value, entryPath, paths);
      }
      return;
    }

    if (node.type === 'array') {
      for (var j = 0; j < node.items.length; j++) {
        collectFieldPaths(node.items[j], joinFieldPath(basePath, j), paths);
      }
    }
  }

  function buildKeyLineMap(formattedText, ast) {
    var keyLineMap = Object.create(null);
    if (!ast) return keyLineMap;

    var orderedPaths = [];
    collectFieldPaths(ast, '', orderedPaths);

    var lines = formattedText.split('\n');
    var cursor = 0;

    for (var i = 0; i < orderedPaths.length; i++) {
      var item = orderedPaths[i];
      var escapedKey = item.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var keyPattern = new RegExp('"'+ escapedKey +'"\\s*:');

      for (var lineIndex = cursor; lineIndex < lines.length; lineIndex++) {
        if (keyPattern.test(lines[lineIndex])) {
          keyLineMap[item.path] = lineIndex + 1;
          cursor = lineIndex + 1;
          break;
        }
      }
    }

    return keyLineMap;
  }

  function compareFieldDiffs(nodeA, nodeB, basePath, result) {
    if (!nodeA && !nodeB) return;
    if (!nodeA) {
      if (basePath) result.rightOnly.push(basePath);
      return;
    }
    if (!nodeB) {
      if (basePath) result.leftOnly.push(basePath);
      return;
    }

    if (nodeA.type === 'object' && nodeB.type === 'object') {
      var mapA = Object.create(null);
      var mapB = Object.create(null);
      var keys = [];
      var seen = Object.create(null);
      var i;

      for (i = 0; i < nodeA.entries.length; i++) {
        mapA[nodeA.entries[i].key] = nodeA.entries[i].value;
        if (!seen[nodeA.entries[i].key]) {
          seen[nodeA.entries[i].key] = true;
          keys.push(nodeA.entries[i].key);
        }
      }
      for (i = 0; i < nodeB.entries.length; i++) {
        mapB[nodeB.entries[i].key] = nodeB.entries[i].value;
        if (!seen[nodeB.entries[i].key]) {
          seen[nodeB.entries[i].key] = true;
          keys.push(nodeB.entries[i].key);
        }
      }

      keys.sort(function(a, b) { return a.localeCompare(b); });

      for (i = 0; i < keys.length; i++) {
        var key = keys[i];
        var nextPath = joinFieldPath(basePath, key);
        if (!(key in mapB)) {
          result.leftOnly.push(nextPath);
        } else if (!(key in mapA)) {
          result.rightOnly.push(nextPath);
        } else {
          compareFieldDiffs(mapA[key], mapB[key], nextPath, result);
        }
      }
      return;
    }

    if (nodeA.type === 'array' && nodeB.type === 'array') {
      var maxLength = Math.max(nodeA.items.length, nodeB.items.length);
      for (var index = 0; index < maxLength; index++) {
        compareFieldDiffs(
          nodeA.items[index],
          nodeB.items[index],
          joinFieldPath(basePath, index),
          result
        );
      }
    }
  }

  function getFieldDiffSummary(astA, astB) {
    var result = { leftOnly: [], rightOnly: [] };
    if (!astA || !astB) return result;
    compareFieldDiffs(astA, astB, '', result);
    return result;
  }

  function normalizeForCompare(input) {
    var source = input || '';
    if (!source.trim()) {
      return { text: '', error: null, lineCount: 0, charCount: 0, maxDepth: 0, ast: null, keyLineMap: Object.create(null) };
    }

    var result = formatJSON(source, false);
    if (result.error) {
      return {
        text: source,
        error: result.error,
        lineCount: source.split('\n').length,
        charCount: source.length,
        maxDepth: undefined,
        ast: null,
        keyLineMap: Object.create(null)
      };
    }

    var sortedAst = sortASTNode(result.ast);
    var formatted = formatAST(sortedAst, 0, 2);
    return {
      text: formatted,
      error: null,
      lineCount: formatted.split('\n').length,
      charCount: formatted.length,
      maxDepth: computeMaxDepth(sortedAst),
      ast: sortedAst,
      keyLineMap: buildKeyLineMap(formatted, sortedAst)
    };
  }

  // ==================== MONGOSQL TABLE VIEW ====================
  let tableMode = false;
  let tableData = null;
  let tableSortCol = -1;
  let tableSortDir = 1;
  let tablePage = 1;
  let tableRowsPerPage = 50;

  let shellMode = false;

  function astValueToDisplay(node) {
    if (!node) return null;
    switch (node.type) {
      case 'string': return node.value;
      case 'number': return node.value;
      case 'literal':
        if (node.value === 'null' || node.value === 'undefined') return null;
        return node.value;
      case 'mongo':
        if (node.func === 'ObjectId') return 'ObjectId(' + node.args + ')';
        if (node.func === 'ISODate') return 'ISODate(' + node.args + ')';
        if (node.func === 'new Date') return 'Date(' + node.args + ')';
        if (node.args != null) return node.func + '(' + node.args + ')';
        return node.func;
      case 'object':
        if (node.entries.length === 0) return '{}';
        return '{…' + node.entries.length + '}';
      case 'array':
        if (node.items.length === 0) return '[]';
        return '[…' + node.items.length + ']';
      default: return JSON.stringify(node);
    }
  }

  function astValueToType(node) {
    if (!node) return 'null';
    switch (node.type) {
      case 'string': return 'string';
      case 'number': return 'number';
      case 'literal':
        if (node.value === 'true' || node.value === 'false') return 'bool';
        if (node.value === 'null' || node.value === 'undefined') return 'null';
        return 'string';
      case 'mongo':
        if (node.func === 'ObjectId') return 'oid';
        if (node.func === 'ISODate' || node.func === 'new Date' || node.func === 'Date') return 'date';
        return 'mongo';
      case 'object': return 'object';
      case 'array': return 'array';
      default: return 'unknown';
    }
  }

  function flattenAST(node, prefix, result) {
    if (!node) { result[prefix] = null; return; }
    if (node.type === 'object') {
      if (node.entries.length === 0) { result[prefix] = node; return; }
      for (var i = 0; i < node.entries.length; i++) {
        var e = node.entries[i];
        flattenAST(e.value, prefix ? prefix + '.' + e.key : e.key, result);
      }
    } else if (node.type === 'array') {
      result[prefix] = node;
      for (var j = 0; j < Math.min(node.items.length, 10); j++) {
        flattenAST(node.items[j], prefix + '[' + j + ']', result);
      }
    } else {
      result[prefix] = node;
    }
  }

  function buildTableFromAST(ast) {
    var docs = [];
    if (!ast) return null;
    if (ast.type === 'array') {
      for (var i = 0; i < ast.items.length; i++) {
        if (ast.items[i].type === 'object') docs.push(ast.items[i]);
      }
    } else if (ast.type === 'object') {
      docs = [ast];
    } else { return null; }

    if (docs.length === 0) return null;

    var allPathsSet = Object.create(null);
    var pathOrder = [];
    var docMaps = [];

    for (var d = 0; d < docs.length; d++) {
      var flat = Object.create(null);
      flattenAST(docs[d], '', flat);
      docMaps.push(flat);
      var keys = Object.keys(flat);
      for (var k = 0; k < keys.length; k++) {
        if (!(keys[k] in allPathsSet)) {
          allPathsSet[keys[k]] = true;
          pathOrder.push(keys[k]);
        }
      }
    }

    pathOrder.sort(function(a, b) {
      var dA = (a.match(/\./g) || []).length;
      var dB = (b.match(/\./g) || []).length;
      if (dA !== dB) return dA - dB;
      return a.localeCompare(b);
    });

    var schema = [];
    for (var p = 0; p < pathOrder.length; p++) {
      var path = pathOrder[p];
      var tCounts = Object.create(null);
      var nulls = 0;
      for (var r = 0; r < docMaps.length; r++) {
        var node = docMaps[r][path];
        if (node === undefined || node === null) { nulls++; continue; }
        var t = astValueToType(node);
        tCounts[t] = (tCounts[t] || 0) + 1;
      }
      var domType = 'null';
      var maxC = 0;
      var tKeys = Object.keys(tCounts);
      for (var ti = 0; ti < tKeys.length; ti++) {
        if (tCounts[tKeys[ti]] > maxC) { maxC = tCounts[tKeys[ti]]; domType = tKeys[ti]; }
      }
      schema.push({
        path: path, dominantType: domType,
        isMixed: tKeys.length > 1, typeCounts: tCounts,
        nullCount: nulls, totalCount: docMaps.length,
        nullRatio: nulls / docMaps.length
      });
    }

    var rows = [];
    for (var dr = 0; dr < docMaps.length; dr++) {
      var row = [];
      for (var sc = 0; sc < schema.length; sc++) {
        row.push(docMaps[dr][schema[sc].path] !== undefined ? docMaps[dr][schema[sc].path] : null);
      }
      rows.push(row);
    }

    var validation = buildValidation(schema, docs.length);
    return { schema: schema, rows: rows, validation: validation, docCount: docs.length };
  }

  function buildValidation(schema, docCount) {
    var checks = [];
    var fullyNull = schema.filter(function(s) { return s.nullCount === s.totalCount; });
    if (fullyNull.length > 0) {
      checks.push({ level: 'warn', msg: fullyNull.length + ' 个字段全为 null: ' + fullyNull.slice(0, 3).map(function(s){return s.path;}).join(', ') + (fullyNull.length > 3 ? '…' : '') });
    }
    var mixed = schema.filter(function(s) { return s.isMixed; });
    if (mixed.length > 0) {
      checks.push({ level: 'warn', msg: mixed.length + ' 个字段类型不一致: ' + mixed.slice(0, 3).map(function(s){var ts=Object.keys(s.typeCounts).join('/'); return s.path+'['+ts+']';}).join(', ') + (mixed.length > 3 ? '…' : '') });
    }
    var highNull = schema.filter(function(s) { return s.nullRatio > 0.5 && s.nullRatio < 1.0; });
    if (highNull.length > 0) {
      checks.push({ level: 'warn', msg: highNull.length + ' 个字段缺失率>50%: ' + highNull.slice(0, 3).map(function(s){return s.path+' ('+Math.round(s.nullRatio*100)+'%)';}).join(', ') + (highNull.length > 3 ? '…' : '') });
    }
    var maxDepth = 0;
    schema.forEach(function(s) { var d = (s.path.match(/\./g) || []).length; if (d > maxDepth) maxDepth = d; });
    checks.unshift({ level: 'ok', msg: docCount + ' 条文档, ' + schema.length + ' 个字段, 最大嵌套深度 ' + maxDepth });
    return checks;
  }

  function loadScript(src) {
    return new Promise(function(resolve, reject) {
      var existing = document.querySelector('script[data-src="' + src + '"]');
      if (existing) {
        if (existing.getAttribute('data-loaded') === '1') {
          resolve();
          return;
        }
        existing.addEventListener('load', function() { resolve(); }, { once: true });
        existing.addEventListener('error', reject, { once: true });
        return;
      }

      var script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.setAttribute('data-src', src);
      script.onload = function() {
        script.setAttribute('data-loaded', '1');
        resolve();
      };
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  function renderTable(schema, rows, sortCol, sortDir) {
    var tableEl = document.getElementById('sqlTable');
    var thead = tableEl.querySelector('thead');
    var tbody = tableEl.querySelector('tbody');
    if (!thead) { thead = document.createElement('thead'); tableEl.appendChild(thead); }
    if (!tbody) { tbody = document.createElement('tbody'); tableEl.appendChild(tbody); }

    var headerHtml = '<tr><th class="col-row-num">#</th>';
    for (var i = 0; i < schema.length; i++) {
      var s = schema[i];
      var badge = s.isMixed ? 't-mixed' : 't-' + s.dominantType;
      var arrow = (sortCol === i) ? (sortDir === 1 ? 'sorted-asc' : 'sorted-desc') : '';
      var dp = s.path.length > 35 ? '…' + s.path.slice(-32) : s.path;
      headerHtml += '<th class="' + arrow + '" data-col="' + i + '" title="' + escapeHtml(s.path) + '">' +
        '<span class="col-path">' + escapeHtml(dp) + '</span>' +
        '<span class="col-type-badge ' + badge + '">' + (s.isMixed ? 'MIXED' : s.dominantType) + '</span></th>';
    }
    headerHtml += '</tr>';
    thead.innerHTML = headerHtml;

    var bodyHtml = '';
    for (var r = 0; r < rows.length; r++) {
      bodyHtml += '<tr><td class="row-num">' + (r + 1) + '</td>';
      for (var c = 0; c < schema.length; c++) {
        var cell = rows[r][c];
        var cls = '', display = '';
        if (cell === null || cell === undefined) { cls = 'cell-null'; display = 'NULL'; }
        else if (cell.type === 'object') { display = '{…' + cell.entries.length + '}'; }
        else if (cell.type === 'array') { cls = cell.items.length === 0 ? 'cell-empty-arr' : ''; display = cell.items.length === 0 ? '[]' : '[…' + cell.items.length + ']'; }
        else { display = astValueToDisplay(cell) || ''; }
        bodyHtml += '<td class="' + cls + '" title="' + escapeHtml(display) + '">' + escapeHtml(display) + '</td>';
      }
      bodyHtml += '</tr>';
    }
    tbody.innerHTML = bodyHtml;
  }

  function applyTableFilter() {
    if (!tableData) return;
    var ft = tableFilterText.toLowerCase().trim();
    if (!ft) { renderTablePage(); return; }
    var filtered = [], matchIndexes = [];
    for (var r = 0; r < tableData.rows.length; r++) {
      var match = false;
      for (var c = 0; c < tableData.schema.length; c++) {
        var d = astValueToDisplay(tableData.rows[r][c]);
        if (d && d.toLowerCase().indexOf(ft) !== -1) { match = true; break; }
      }
      if (!match) {
        for (var pc = 0; pc < tableData.schema.length; pc++) {
          if (tableData.schema[pc].path.toLowerCase().indexOf(ft) !== -1) { match = true; break; }
        }
      }
      if (match) { filtered.push(tableData.rows[r]); matchIndexes.push(r + 1); }
    }
    tablePage = Math.max(1, Math.min(tablePage, Math.ceil(filtered.length / tableRowsPerPage) || 1));
    var totalPages = Math.ceil(filtered.length / tableRowsPerPage) || 1;
    var start = (tablePage - 1) * tableRowsPerPage;
    renderTable(tableData.schema, filtered.slice(start, start + tableRowsPerPage), tableSortCol, tableSortDir);
    document.getElementById('tableRowCount').textContent = '🔍 ' + filtered.length + ' / ' + tableData.rows.length + ' 行';
    document.getElementById('tablePageInfo').textContent = tablePage + '/' + totalPages;
    document.getElementById('tablePrevBtn').disabled = tablePage <= 1;
    document.getElementById('tableNextBtn').disabled = tablePage >= totalPages;
  }

  function sortTableData(colIndex) {
    if (!tableData) return;
    if (tableSortCol === colIndex) {
      tableSortDir = -tableSortDir;
    } else {
      tableSortCol = colIndex;
      tableSortDir = 1;
    }
    tableData.rows.sort(function(a, b) {
      var va = astValueToDisplay(a[colIndex]), vb = astValueToDisplay(b[colIndex]);
      if (va === null && vb === null) return 0;
      if (va === null) return 1; if (vb === null) return -1;
      var na = parseFloat(va), nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * tableSortDir;
      return String(va).localeCompare(String(vb)) * tableSortDir;
    });
    tablePage = 1;
    applyTableFilter();
  }

  function renderTablePage() {
    if (!tableData) return;
    var sourceRows = tableData.rows;
    if (tableFilterText.trim()) { applyTableFilter(); return; }
    var totalPages = Math.ceil(sourceRows.length / tableRowsPerPage) || 1;
    if (tablePage > totalPages) tablePage = totalPages;
    var start = (tablePage - 1) * tableRowsPerPage;
    renderTable(tableData.schema, sourceRows.slice(start, start + tableRowsPerPage), tableSortCol, tableSortDir);
    document.getElementById('tableRowCount').textContent = '共 ' + sourceRows.length + ' 行 (' + tableData.schema.length + ' 列)';
    document.getElementById('tablePageInfo').textContent = tablePage + '/' + totalPages;
    document.getElementById('tablePrevBtn').disabled = tablePage <= 1;
    document.getElementById('tableNextBtn').disabled = tablePage >= totalPages;
  }

  function refreshTable() {
    if (!tableMode) return;
    var inputText = els.input.value;
    if (isEditMode) inputText = els.outputTextarea.value;
    if (!inputText.trim()) {
      document.getElementById('validationBanner').innerHTML = '';
      document.getElementById('sqlTable').innerHTML = '';
      document.getElementById('tableRowCount').textContent = '';
      setStatus('', '表格模式 — 输入为空');
      return;

    var result = formatJSON(inputText, false);
    if (!result.error && result.ast) {
      tableData = buildTableFromAST(result.ast);
      if (tableData) {
        tableSortCol = -1; tableSortDir = 1; tablePage = 1;
        tableFilterText = ''; document.getElementById('tableFilter').value = '';
        renderValidationBanner(tableData.validation);
        renderTablePage();
        setStatus('success', '表格模式 — ' + tableData.docCount + ' 条文档');

    document.getElementById('validationBanner').innerHTML = '<span class="val-stat err">⚠️ 无法构建表格（需要对象或对象数组）</span>';

  function exportTableCSV() {

  function parseShellArgs(input, startPos) {
    var i=startPos,len=input.length,args=[],depth=0,argStart=startPos;
    var inDQ=false,inSQ=false;
    for(;i<len;i++){
      var ch=input[i];
      if(inDQ){if(ch==='\\')i++;else if(ch==='"')inDQ=false;continue;}
      if(inSQ){if(ch==='\\')i++;else if(ch==="'")inSQ=false;continue;}
      if(ch==='"'){inDQ=true;continue;}
      if(ch==="'"){inSQ=true;continue;}
      if(ch==='('||ch==='{'||ch==='[')depth++;
      else if(ch===')'||ch==='}'||ch===']'){
        depth--;
        if(depth===-1&&ch===')'){
          var last=input.slice(argStart,i).trim();
          if(last)args.push(last);
          return {args:args,endPos:i+1};
        }
      }else if(ch===','&&depth===0){
        args.push(input.slice(argStart,i).trim());
        argStart=i+1;
      }
    }
    return {args:args,endPos:i};
  }

  function parseShellStatement(input) {
    if(!input||!input.trim())return null;
    var i=0,len=input.length;
    function skipWS(){while(i<len){if(/\s/.test(input[i])){i++;continue;}if(input[i]==='/'&&input[i+1]==='/'){while(i<len&&input[i]!=='\n')i++;continue;}break;}}
    skipWS();if(i>=len)return null;
    if(input.slice(i,i+2)!=='db'&&input.slice(i,i+2)!=='Db'&&input.slice(i,i+2)!=='DB')return null;
    i+=2;skipWS();if(i>=len||input[i]!=='.')return null;i++;skipWS();
    var collection='';
    if(input.slice(i,i+13)==='getCollection'||input.slice(i,i+13)==='GetCollection'){
      i+=13;skipWS();if(input[i]==='('){i++;skipWS();var q=input[i];if(q==='"'||q==="'"){i++;while(i<len&&input[i]!==q){collection+=input[i];i++;}i++;}skipWS();if(input[i]===')')i++;}
    }else{while(i<len&&/[a-zA-Z0-9_\-]/.test(input[i])){collection+=input[i];i++;}}
    if(!collection)return null;
    var methods=[];
    while(i<len){skipWS();if(i>=len)break;if(input[i]!=='.')break;i++;skipWS();
      var mName='';while(i<len&&/[a-zA-Z0-9_]/.test(input[i])){mName+=input[i];i++;}
      skipWS();if(i<len&&input[i]==='('){i++;var pr=parseShellArgs(input,i);i=pr.endPos;methods.push({name:mName,argsRaw:pr.args});}
      else methods.push({name:mName,argsRaw:[]});
    }
    return {collection:collection,methods:methods};
  }

  function highlightShellStatement(input) {
    var html='',i=0,len=input.length;
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    while(i<len){
      if(/\s/.test(input[i])){html+=input[i];i++;continue;}
      if(input[i]==='/'&&input[i+1]==='/'){
        var cmt='';while(i<len&&input[i]!=='\n'){cmt+=input[i];i++;}
        html+='<span class="hl-shell-comment">'+esc(cmt)+'</span>';continue;
      }
      if(input[i]==='"'||input[i]==="'"){
        var q=input[i],str=q;i++;
        while(i<len&&input[i]!==q){str+=input[i];i++;}
        if(i<len){str+=input[i];i++;}
        html+='<span class="hl-shell-str">'+esc(str)+'</span>';continue;
      }
      if((input.slice(i,i+2)==='db'||input.slice(i,i+2)==='DB')&&(i+2>=len||!/[a-zA-Z0-9_]/.test(input[i+2]))){
        html+='<span class="hl-shell-db">'+input.slice(i,i+2)+'</span>';i+=2;continue;
      }
      if(input[i]==='$'&&i+1<len&&/[a-zA-Z]/.test(input[i+1])){
        var op='$';i++;while(i<len&&/[a-zA-Z0-9]/.test(input[i])){op+=input[i];i++;}
        html+='<span class="hl-shell-op">'+esc(op)+'</span>';continue;
      }
      if(i>0&&input[i-1]==='.'&&/[a-zA-Z]/.test(input[i])){
        var method='';while(i<len&&/[a-zA-Z0-9_]/.test(input[i])){method+=input[i];i++;}
        html+='<span class="hl-shell-method">'+esc(method)+'</span>';continue;
      }
      if(/[a-zA-Z_]/.test(input[i])){
        var word='',wi=i;while(wi<len&&/[a-zA-Z0-9_]/.test(input[wi])){word+=input[wi];wi++;}
        var after=wi;while(after<len&&/\s/.test(input[after]))after++;
        if(KNOWN_MONGO_METHODS[word]&&after<len&&input[after]==='('){html+='<span class="hl-shell-method">'+esc(word)+'</span>';i=wi;continue;}
        html+=esc(input[i]);i++;continue;
      }
      if(input[i]==='('||input[i]===')'){html+='<span class="hl-shell-paren">'+input[i]+'</span>';i++;continue;}
      if(input[i]==='.'){html+='<span class="hl-shell-dot">.</span>';i++;continue;}
      if(input[i]===','){html+='<span class="hl-shell-comma">,</span>';i++;continue;}
      html+=esc(input[i]);i++;
    }
    return html;
  }

  function formatShellStatement(input) {
    var parsed=parseShellStatement(input);
    if(!parsed||parsed.methods.length===0)return null;
    var lines=[],collRef='db.getCollection("'+parsed.collection+'")';
    function fmtArg(raw){
      if(!raw)return raw;
      var r=formatJSON(raw,false);
      if(!r.error&&r.ast)return r.formatted;
      return raw;
    }
    for(var m=0;m<parsed.methods.length;m++){
      var method=parsed.methods[m];
      var prefix=(m===0?collRef:'')+'.'+method.name+'(';
      var args=(method.argsRaw||[]).map(fmtArg);
      if(args.length===0){lines.push(prefix+')');}
      else if(args.length===1&&args[0].indexOf('\n')===-1){lines.push(prefix+args[0]+')');}
      else{
        var body='';
        for(var a=0;a<args.length;a++){
          var argLines=(a===0&&args[a].indexOf('\n')===-1)?[args[a]]:args[a].split('\n');
          var indented=argLines.map(function(ln){return'  '+ln;}).join('\n');
          body+=indented;if(a<args.length-1)body+=',';body+='\n';
        }
        lines.push(prefix+'\n'+body+')');
      }
    }
    return lines.join('\n');
  }

  function validateShellStatement(input) {
    var parsed=parseShellStatement(input);
    if(!parsed){return[{level:'err',msg:'未识别为有效的 MongoDB Shell 语句（期望 db.xxx）'}];}
    var checks=[];
    checks.push({level:'ok',msg:'集合: '+parsed.collection+', '+parsed.methods.length+' 个方法调用'});
    for(var m=0;m<parsed.methods.length;m++){var mn=parsed.methods[m].name;if(!KNOWN_MONGO_METHODS[mn])checks.push({level:'warn',msg:'未知方法: .'+mn+'()'});}
    var foundOps={},opRegex=/\$[a-zA-Z][a-zA-Z0-9]*/g,match;
    while((match=opRegex.exec(input))!==null){foundOps[match[0]]=(foundOps[match[0]]||0)+1;}
    var unknownOps=Object.keys(foundOps).filter(function(o){return!KNOWN_MONGO_OPS[o];});
    if(unknownOps.length>0)checks.push({level:'warn',msg:'可能未定义的操作符: '+unknownOps.slice(0,5).join(', ')+(unknownOps.length>5?'…':'')});
    var depth=0,inStr=false,strCh='';
    for(var i=0;i<input.length;i++){var ch=input[i];if(inStr){if(ch==='\\')i++;else if(ch===strCh)inStr=false;continue;}if(ch==='"'||ch==="'"){inStr=true;strCh=ch;continue;}if(ch==='('||ch==='{'||ch==='[')depth++;else if(ch===')'||ch==='}'||ch===']')depth--;}
    if(depth!==0)checks.push({level:'err',msg:'括号不匹配 (深度: '+depth+')'});
    return checks;
  }

  // ==================== UI ====================
  const els = {

  let currentTheme = 'dark';

  function showToast(msg) {
    els.toast.textContent = msg;

  function showError(msg, pos) {
    els.errorDisplay.textContent = msg;
    els.errorDisplay.classList.add('visible');
    setStatus('error', '格式错误');

    // Highlight error position in textarea if possible
    if (pos !== undefined && pos >= 0 && els.input === document.activeElement) {
      els.input.setSelectionRange(pos, pos + 1);
    }
    // Try to scroll to error position
    if (pos !== undefined && pos >= 0) {
      const linesBefore = els.input.value.substring(0, pos).split('\n').length;
      const lineHeight = 22; // approximate
      els.input.scrollTop = Math.max(0, (linesBefore - 5) * lineHeight);
    }
  }

  function clearError() {
    els.errorDisplay.textContent = '';
    els.errorDisplay.classList.remove('visible');
  }

  function updateOutputViews(formattedText) {
    // Update both the highlighted pre and the raw textarea
    els.output.innerHTML = renderOutput(formattedText);
    els.outputTextarea.value = formattedText;
    els.outputWrapper.scrollTop = 0;
    els.outputTextarea.scrollTop = 0;
  }

  function setPlaceholder() {
    els.output.innerHTML = '<code class="output-code"><span class="output-placeholder">格式化后的 JSON 将显示在这里</span></code>';
    els.outputTextarea.value = '';
    els.outputTextarea.placeholder = '格式化后的 JSON 将显示在这里';
    clearError();
    isOutputCollapsed = false;
    updateCollapseButtonLabel();
    setStatus('', '就绪');
    updateStats(0, 0, undefined);
    lastResult = null;
  }

  function doFormat(compact) {
    if (diffMode) {
      normalizeCompareModels();
      updateDiffSummary();
      showToast('✅ 已按字段排序并刷新对比');
      return;
    }
    if (shellMode) { doShellFormat(); return; }

    const input = els.input.value;
    const result = formatJSON(input, compact);

    if (result.error) {
      showError(result.error, result.position);
      els.output.innerHTML = '<code class="output-code"><span class="output-placeholder">解析失败，请检查输入</span></code>';
      els.outputTextarea.value = '';
      updateStats(0, 0, undefined);
      return;
    }

    clearError();
    isOutputCollapsed = compact;
    updateCollapseButtonLabel();
    lastResult = result;
    updateOutputViews(result.formatted);
    setStatus('success', compact ? '已收起' : '已展开');
    updateStats(result.charCount, result.lineCount, result.maxDepth);
  }

  function liveFormat() {
    const input = els.input.value;
    if (!input.trim()) {
      setPlaceholder();
      return;
    }

    const result = formatJSON(input, false);
    if (result.error) {
      showError(result.error, result.position);
      els.output.innerHTML = '<code class="output-code"><span class="output-placeholder">解析失败，请检查输入</span></code>';
      els.outputTextarea.value = '';
      updateStats(0, 0, undefined);
      lastResult = null;
      return;
    }

    clearError();
    isOutputCollapsed = false;
    updateCollapseButtonLabel();
    lastResult = result;
    updateOutputViews(result.formatted);
    setStatus('success', '已格式化');
    updateStats(result.charCount, result.lineCount, result.maxDepth);
    if (tableMode) refreshTable();
  }

  // Debounced live format
  let debounceTimer = null;
  function debouncedLiveFormat() {
    if (debounceTimer) clearTimeout(debounceTimer);
    if (diffMode) return;
    if (shellMode) { shellDebouncedFormat(); return; }
    debounceTimer = setTimeout(function() {
      liveFormat();
      if (tableMode) refreshTable();
    }, 300);
  }

  // ==================== SHELL MODE TOGGLE & FORMAT ====================
  var shellDebounceTimer = null;
  function shellDebouncedFormat() {
    if (shellDebounceTimer) clearTimeout(shellDebounceTimer);
    shellDebounceTimer = setTimeout(doShellFormat, 300);
  }

  function doShellFormat(sourceText) {
    if (!shellMode) return;
    var input = sourceText || els.input.value;
    if (!input.trim()) { setPlaceholder(); return; }
    var parsed = parseShellStatement(input);
    if (!parsed) {
      els.output.innerHTML = '<code class="output-code"><span class="output-placeholder">⚠️ 未识别为 MongoDB Shell 语句（期望 db.xxx 开头）</span></code>';
      els.outputTextarea.value = '';
      setStatus('warn', '非 Shell 语句');
      updateStats(0, 0, undefined);
      return;
    }
    var formatted = formatShellStatement(input);
    var highlighted = highlightShellStatement(formatted || input);
    els.output.innerHTML = '<pre style="margin:0;padding:16px;font-family:var(--font-mono);font-size:13px;line-height:1.65;tab-size:2;white-space:pre;"><code>' + highlighted + '</code></pre>';
    els.outputTextarea.value = formatted || input;
    var validation = validateShellStatement(input);
    var validationHtml = validation.map(function(v) {
      var icon = v.level === 'ok' ? '✅' : v.level === 'warn' ? '⚠️' : '❌';
      return '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:12px;">' + icon + ' ' + escapeHtml(v.msg) + '</span>';
    }).join('');
    if (validationHtml) {
      els.errorDisplay.innerHTML = validationHtml;
      els.errorDisplay.classList.add('visible');
    } else {
      clearError();
    }
    var allOk = validation.every(function(v) { return v.level === 'ok'; });
    if (allOk) setStatus('success', 'Shell 已格式化');
    else if (validation.some(function(v) { return v.level === 'err'; })) setStatus('error', '校验错误');
    else setStatus('warn', '校验警告');
    updateStats(input.length, formatted ? formatted.split('\n').length : 0, undefined);
  }

  function toggleShellMode() {
    if (diffMode) return;
    if (tableMode) toggleTableMode();
    shellMode = !shellMode;
    var shellBtn = document.getElementById('shellBtn');
    if (shellMode) {
      shellBtn.classList.add('diff-btn-active');
      shellBtn.textContent = '📄 JSON';
      doShellFormat();
    } else {
      shellBtn.classList.remove('diff-btn-active');
      shellBtn.textContent = '🔧 Shell';
      clearError();
      setPlaceholder();
      liveFormat();
    }
  }

  function getActiveDiffText() {
    if (!diffEditor) return '';
    var originalEditor = diffEditor.getOriginalEditor();
    var modifiedEditor = diffEditor.getModifiedEditor();
    if (originalEditor && originalEditor.hasTextFocus() && diffOriginalModel) {
      return diffOriginalModel.getValue();
    }
    if (modifiedEditor && modifiedEditor.hasTextFocus() && diffModifiedModel) {
      return diffModifiedModel.getValue();
    }
    if (diffModifiedModel) return diffModifiedModel.getValue();
    if (diffOriginalModel) return diffOriginalModel.getValue();
    return '';
  }

  function copyOutput() {
    var text;
    if (diffMode) {
      text = getActiveDiffText();
    } else if (isEditMode) {
      text = els.outputTextarea.value;
    } else if (lastResult && lastResult.formatted) {
      text = lastResult.formatted;
    }
    if (!text || !text.trim()) {
      showToast('没有可复制的内容');
      return;
    }
    navigator.clipboard.writeText(text).then(function() {
      showToast('✅ 已复制到剪贴板');
    }).catch(function() {
      showToast('❌ 复制失败');
    });

  function toggleEditMode() {

    if (isEditMode) {
      panel.classList.add('edit-mode');
      els.editBtn.innerHTML = '🔒 查看';

      panel.classList.remove('edit-mode');
      els.editBtn.innerHTML = '✏️ 编辑';
      els.editBtn.title = '切换为编辑模式';

      if (rawText.trim()) {
        // Shell mode: format edited text as Shell statement
        if (shellMode) {
          doShellFormat(rawText);
          els.input.value = rawText;
          return;

        var result = formatJSON(rawText, false);
        if (result.error) {
          showToast('⚠️ 内容格式有误，保持原始内容');

        updateOutputViews(result.formatted);
