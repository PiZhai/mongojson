services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mongojson
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mongojson"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: :8080
      STEWARD_PEER_HTTP_ADDR: ""
      # The container listener is remote only inside Docker; host publication remains loopback-only below.
      STEWARD_ALLOW_REMOTE_MANAGEMENT: "true"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mongojson?sslmode=disable
      STORAGE_DIR: /app/data
      FILE_RETENTION_HOURS: 24
      STEWARD_SYNC_REQUIRE_AUTH: "${STEWARD_SYNC_REQUIRE_AUTH:-true}"
      STEWARD_SYNC_ALLOW_INSECURE: "${STEWARD_SYNC_ALLOW_INSECURE:-false}"
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-18080}:8080"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_HOST_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  backend_data:
