services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mongojson
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mongojson"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo-script-analyzer:
    build:
      context: ./analyzer
    expose:
      - "8090"
    networks:
      - mongo_review_internal
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      mongo-script-analyzer:
        condition: service_started
    environment:
      HTTP_ADDR: :8080
      STEWARD_PEER_HTTP_ADDR: ""
      # The container listener is remote only inside Docker; host publication remains loopback-only below.
      STEWARD_ALLOW_REMOTE_MANAGEMENT: "true"
      STEWARD_MANAGEMENT_AUTH_REQUIRED: "true"
      STEWARD_MANAGEMENT_AUTH_TOKEN: "${STEWARD_MANAGEMENT_AUTH_TOKEN:?set STEWARD_MANAGEMENT_AUTH_TOKEN to a random value of at least 32 characters}"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mongojson?sslmode=disable
      STORAGE_DIR: /app/data
      FILE_RETENTION_HOURS: 24
      MONGODB_REVIEW_ANALYZER_URL: http://mongo-script-analyzer:8090
      MONGODB_REVIEW_ENCRYPTION_KEY: "${MONGODB_REVIEW_ENCRYPTION_KEY:-local-development-key-change-me}"
      MONGODB_REVIEW_REPOSITORY_ROOT: /scripts
      STEWARD_SYNC_REQUIRE_AUTH: "${STEWARD_SYNC_REQUIRE_AUTH:-true}"
      STEWARD_SYNC_ALLOW_INSECURE: "${STEWARD_SYNC_ALLOW_INSECURE:-false}"
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-18080}:8080"
    volumes:
      - backend_data:/app/data
      - "${MONGODB_REVIEW_REPOSITORY_HOST_PATH:-/Users/administrator/GolandProjects/script}:/scripts"
    networks:
      - default
      - mongo_review_internal

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_HOST_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  backend_data:

networks:
  mongo_review_internal:
    internal: true
